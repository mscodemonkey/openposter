services:
  node_a:
    build: .
    ports:
      - "8081:8080"
    environment:
      - OPENPOSTER_BASE_URL=http://localhost:8081
      - OPENPOSTER_NODE_NAME=OpenPoster Node A
      - OPENPOSTER_OPERATOR_NAME=Creator A
      - OPENPOSTER_MIRRORS=http://localhost:8083
      - OPENPOSTER_ADMIN_TOKEN=dev-admin
      - OPENPOSTER_ALLOW_PRIVATE_NODES=true
      - OPENPOSTER_CORS_ORIGINS=http://localhost:3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/v1/health').read(); print('ok')"]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - ./data-a:/data

  node_b:
    build: .
    ports:
      - "8082:8080"
    environment:
      - OPENPOSTER_BASE_URL=http://localhost:8082
      - OPENPOSTER_NODE_NAME=OpenPoster Node B
      - OPENPOSTER_OPERATOR_NAME=Creator B
      - OPENPOSTER_ADMIN_TOKEN=dev-admin
      - OPENPOSTER_ALLOW_PRIVATE_NODES=true
      - OPENPOSTER_CORS_ORIGINS=http://localhost:3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/v1/health').read(); print('ok')"]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - ./data-b:/data

  # A simple 'mirror' node for blob distribution testing.
  # For now it just shares the blob store of node_a so clients can fetch blobs
  # from a different origin. Later we'll implement proper mirror syncing.
  mirror_for_a:
    build: .
    ports:
      - "8083:8080"
    environment:
      - OPENPOSTER_BASE_URL=http://localhost:8083
      - OPENPOSTER_NODE_NAME=Mirror for Node A
      - OPENPOSTER_OPERATOR_NAME=Mirror Operator
      - OPENPOSTER_MIRROR_ORIGIN=http://node_a:8080
      - OPENPOSTER_MIRROR_POLL_SECONDS=5
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/v1/health').read(); print('ok')"]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - ./data-mirror:/data

  directory:
    # A simple "directory" node that only exists to accept registrations and serve /v1/nodes.
    # This is a bootstrap component for real-world testing.
    build: .
    ports:
      - "8084:8080"
    environment:
      # Use the service DNS name so other containers (indexer) can crawl it.
      - OPENPOSTER_BASE_URL=http://directory:8080
      - OPENPOSTER_NODE_NAME=OpenPoster Directory
      - OPENPOSTER_OPERATOR_NAME=Directory Operator
      - OPENPOSTER_ADMIN_TOKEN=dev-admin
      - OPENPOSTER_ALLOW_PRIVATE_NODES=true
      - OPENPOSTER_CORS_ORIGINS=http://localhost:3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/v1/health').read(); print('ok')"]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - ./data-directory:/data

  indexer:
    build: ../indexer
    ports:
      - "8090:8090"
    environment:
      - OPENPOSTER_INDEXER_SEEDS=http://directory:8080
      - OPENPOSTER_INDEXER_POLL_SECONDS=10
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/v1/health').read(); print('ok')"]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - ./data-indexer:/data

  web:
    build: ../web
    ports:
      - "3000:3000"
    environment:
      - NEXT_TELEMETRY_DISABLED=1
      # Helps file watching work reliably with bind mounts.
      - CHOKIDAR_USEPOLLING=1
      # Browser hits indexer via host port mapping.
      - NEXT_PUBLIC_INDEXER_BASE_URL=http://localhost:8090
    restart: unless-stopped
    volumes:
      - ../web:/app
      - /app/node_modules
      - /app/.next
