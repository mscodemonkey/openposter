name: E2E

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TMDB_READ_ACCESS_TOKEN: ${{ secrets.TMDB_READ_ACCESS_TOKEN }}
      OPENPOSTER_TEST_RESET_TOKEN: dev-reset
      OPENPOSTER_TEST_ADMIN_TOKEN: dev-admin
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Detect TMDB configuration
        shell: bash
        run: |
          if [ -n "${TMDB_READ_ACCESS_TOKEN}" ]; then
            echo "OPENPOSTER_E2E_HAS_TMDB=true" >> "$GITHUB_ENV"
            echo "TMDB-backed E2E coverage: enabled" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "OPENPOSTER_E2E_HAS_TMDB=false" >> "$GITHUB_ENV"
            echo "::notice title=TMDB secret missing::TMDB_READ_ACCESS_TOKEN is not configured. TMDB-dependent E2E specs will be skipped in this run."
            {
              echo "TMDB-backed E2E coverage: disabled"
              echo
              echo "- Missing repository secret: \`TMDB_READ_ACCESS_TOKEN\`"
              echo "- Result: TMDB-dependent Studio specs will be skipped"
              echo "- Remaining E2E coverage will still run"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Detect Plex bootstrap configuration
        shell: bash
        run: |
          if [ -n "${OPENPOSTER_E2E_PLEX_BASE_URL}" ] && [ -n "${OPENPOSTER_E2E_PLEX_TOKEN}" ]; then
            echo "OPENPOSTER_E2E_HAS_PLEX=true" >> "$GITHUB_ENV"
            echo "Plex-backed My Media E2E coverage: enabled (env)" >> "$GITHUB_STEP_SUMMARY"
          elif [ -f "reference-node/data-a/plex_settings.json" ] || [ -f "reference-node/data-a/media_servers.json" ]; then
            echo "OPENPOSTER_E2E_HAS_PLEX=true" >> "$GITHUB_ENV"
            echo "Plex-backed My Media E2E coverage: enabled (fixture file)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "OPENPOSTER_E2E_HAS_PLEX=false" >> "$GITHUB_ENV"
            echo "::notice title=Plex bootstrap missing::No Plex bootstrap config was found. My Media E2E specs will be skipped in this run."
            {
              echo "Plex-backed My Media E2E coverage: disabled"
              echo
              echo "- Missing Plex bootstrap env or fixture data"
              echo "- Result: My Media E2E specs will be skipped"
              echo "- Studio, indexer, diagnostics, and non-Plex flows will still run"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Install root dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start Docker stack
        run: docker compose up -d --build

      - name: Run Playwright E2E suite
        run: npx playwright test

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-test-results
          path: test-results
          if-no-files-found: ignore

      - name: Capture Docker logs
        if: failure()
        run: docker compose logs --no-color > docker-compose.log

      - name: Upload Docker logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: docker-compose-logs
          path: docker-compose.log
          if-no-files-found: ignore

      - name: Shut down Docker stack
        if: always()
        run: docker compose down -v
