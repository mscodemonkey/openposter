# OpenPoster — canonical dev compose (repo root)
#
# This is the single compose file for the whole stack.
# The old reference-node/compose.multi.yml is superseded by this file.
#
# Services:
#   node-a    :8081  — creator node (Studio / upload)
#   node-b    :8082  — consumer node (My Media / Plex)
#   indexer   :8090  — crawls nodes, powers search
#   issuer    :8085  — identity, creator handles, node directory
#   web       :3000  — Web UI pointed at Node A (creator)
#   web-b     :3002  — Web UI pointed at Node B (consumer testing)
#   diag      :3001  — Diagnostics UI
#
# First-time setup:
#   1. Copy .env.example to .env and fill in TMDB_READ_ACCESS_TOKEN
#   2. docker compose up --build
#
# Dev reset (wipes all state):
#   curl "http://localhost:8081/dev/reset?token=dev-reset"
#   curl "http://localhost:8082/dev/reset?token=dev-reset"
#   curl "http://localhost:8085/dev/reset?token=dev-reset"

services:

  # ── Node A (creator) ──────────────────────────────────────────────────────
  node-a:
    build: ./reference-node
    ports:
      - "8081:8080"
    environment:
      PORT: "8080"
      OPENPOSTER_BASE_URL: "http://localhost:8081"
      OPENPOSTER_NODE_NAME: "Node A (Creator)"
      OPENPOSTER_OPERATOR_NAME: "OpenPoster Dev"
      OPENPOSTER_OPERATOR_CONTACT: "mailto:dev@openposter.local"
      OPENPOSTER_ADMIN_TOKEN: "dev-admin"
      OPENPOSTER_ALLOW_PRIVATE_NODES: "true"
      OPENPOSTER_CORS_ORIGINS: "http://localhost:3000,http://localhost:3001"
      OPENPOSTER_DEV_RESET_TOKEN: "dev-reset"
    volumes:
      - node-a-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/v1/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 10

  # ── Node B (consumer) ─────────────────────────────────────────────────────
  node-b:
    build: ./reference-node
    ports:
      - "8082:8080"
    environment:
      PORT: "8080"
      OPENPOSTER_BASE_URL: "http://localhost:8082"
      OPENPOSTER_NODE_NAME: "Node B (Consumer)"
      OPENPOSTER_OPERATOR_NAME: "OpenPoster Dev"
      OPENPOSTER_OPERATOR_CONTACT: "mailto:dev@openposter.local"
      OPENPOSTER_ADMIN_TOKEN: "dev-admin"
      OPENPOSTER_ALLOW_PRIVATE_NODES: "true"
      OPENPOSTER_CORS_ORIGINS: "http://localhost:3000,http://localhost:3001,http://localhost:3002"
      OPENPOSTER_DEV_RESET_TOKEN: "dev-reset"
    volumes:
      - node-b-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/v1/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 10

  # ── Indexer ───────────────────────────────────────────────────────────────
  indexer:
    build: ./indexer
    ports:
      - "8090:8090"
    environment:
      PORT: "8090"
      # Seed from Node A via Docker internal network so the indexer can crawl it
      OPENPOSTER_INDEXER_SEEDS: "http://node-a:8080"
      OPENPOSTER_INDEXER_POLL_SECONDS: "10"
      OPENPOSTER_CORS_ORIGINS: "http://localhost:3000,http://localhost:3001,http://localhost:3002"
    volumes:
      - indexer-data:/data
    depends_on:
      node-a:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/v1/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 10

  # ── Issuer ────────────────────────────────────────────────────────────────
  issuer:
    build: ./issuer
    ports:
      - "8085:8085"
    environment:
      OPENPOSTER_ISSUER_BASE_URL: "http://localhost:8085"
      OPENPOSTER_ISSUER_JWT_SECRET: "dev-jwt-secret-change-in-production"
      OPENPOSTER_ISSUER_JWT_ISSUER: "openposter-issuer"
      OPENPOSTER_ISSUER_JWT_EXP_SECONDS: "31536000"
      OPENPOSTER_DEV_RESET_TOKEN: "dev-reset"
      OPENPOSTER_CORS_ORIGINS: "http://localhost:3000,http://localhost:3001,http://localhost:3002"
    volumes:
      - issuer-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8085/v1/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 10

  # ── Web UI (Studio + My Media) ────────────────────────────────────────────
  web:
    build: ./web
    ports:
      - "3000:3000"
    environment:
      # NEXT_PUBLIC_ vars are browser-visible — must use localhost so client fetches work
      NEXT_PUBLIC_INDEXER_BASE_URL: "http://localhost:8090"
      NEXT_PUBLIC_ISSUER_BASE_URL: "http://localhost:8085"
      # Server-side vars use Docker internal DNS for server component fetches
      INDEXER_BASE_URL: "http://indexer:8090"
      ISSUER_BASE_URL: "http://issuer:8085"
      TMDB_READ_ACCESS_TOKEN: "${TMDB_READ_ACCESS_TOKEN}"
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      node-a:
        condition: service_healthy
      indexer:
        condition: service_healthy
      issuer:
        condition: service_healthy
    restart: unless-stopped

  # ── Web UI B (consumer testing — Node B) ─────────────────────────────────
  web-b:
    build: ./web
    ports:
      - "3002:3000"
    environment:
      NEXT_PUBLIC_INDEXER_BASE_URL: "http://localhost:8090"
      NEXT_PUBLIC_ISSUER_BASE_URL: "http://localhost:8085"
      INDEXER_BASE_URL: "http://indexer:8090"
      ISSUER_BASE_URL: "http://issuer:8085"
      TMDB_READ_ACCESS_TOKEN: "${TMDB_READ_ACCESS_TOKEN}"
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      node-b:
        condition: service_healthy
      indexer:
        condition: service_healthy
      issuer:
        condition: service_healthy
    restart: unless-stopped

  # ── Diagnostics UI ────────────────────────────────────────────────────────
  diag:
    build: ./diagnostics-app
    ports:
      - "3001:3001"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      node-a:
        condition: service_healthy
      node-b:
        condition: service_healthy
      indexer:
        condition: service_healthy
      issuer:
        condition: service_healthy
    restart: unless-stopped

volumes:
  node-a-data:
  node-b-data:
  indexer-data:
  issuer-data:
