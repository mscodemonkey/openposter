# OpenPoster — canonical dev compose (repo root)
#
# This is the single compose file for the whole stack.
# The old reference-node/compose.multi.yml is superseded by this file.
#
# Services:
#   directory :8084  — bootstrap directory node (gossip, /v1/nodes)
#   node-a    :8081  — creator node (Studio / upload)
#   node-b    :8082  — consumer node (My Media / Plex)
#   indexer   :8090  — crawls nodes, powers search (seeds from directory)
#   issuer    :8085  — identity, creator handles, node registry
#   web       :3000  — Web UI pointed at Node A (creator)
#   web-b     :3002  — Web UI pointed at Node B (consumer testing)
#   diag      :3001  — Diagnostics UI
#
# First-time setup:
#   1. Copy .env.example to .env and fill in TMDB_READ_ACCESS_TOKEN
#   2. docker compose up --build
#
# Dev reset (wipes all state):
#   curl "http://localhost:8081/dev/reset?token=dev-reset"
#   curl "http://localhost:8082/dev/reset?token=dev-reset"
#   curl "http://localhost:8085/dev/reset?token=dev-reset"

services:

  # ── Directory (bootstrap gossip node) ────────────────────────────────────
  # Plain reference-node instance whose sole job is to accept node registrations
  # and serve GET /v1/nodes for gossip bootstrap. The indexer seeds from here,
  # mirroring production where all indexers seed from directory.openposter.art.
  directory:
    build: ./reference-node
    ports:
      - "8084:8080"
    environment:
      PORT: "8080"
      OPENPOSTER_BASE_URL: "http://directory:8080"
      OPENPOSTER_NODE_NAME: "OpenPoster Directory"
      OPENPOSTER_OPERATOR_NAME: "OpenPoster Dev"
      OPENPOSTER_ADMIN_TOKEN: "dev-admin"
      OPENPOSTER_ALLOW_PRIVATE_NODES: "true"
      OPENPOSTER_CORS_ORIGINS: "http://localhost:3000,http://localhost:3001,http://localhost:3002"
      OPENPOSTER_DEV_RESET_TOKEN: "dev-reset"
    volumes:
      - ./reference-node/openposter_node:/app/openposter_node
      - ./reference-node/pyproject.toml:/app/pyproject.toml:ro
      - ./reference-node/data-directory:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/v1/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 10

  # ── Node A (creator) ──────────────────────────────────────────────────────
  node-a:
    build: ./reference-node
    ports:
      - "8081:8080"
    environment:
      PORT: "8080"
      OPENPOSTER_BASE_URL: "http://localhost:8081"
      OPENPOSTER_OFFICIAL_DIRECTORY_URL: "http://directory:8080"
      OPENPOSTER_NODE_NAME: "Node A (Creator)"
      OPENPOSTER_OPERATOR_NAME: "OpenPoster Dev"
      OPENPOSTER_OPERATOR_CONTACT: "mailto:dev@openposter.local"
      OPENPOSTER_ADMIN_TOKEN: "dev-admin"
      OPENPOSTER_ALLOW_PRIVATE_NODES: "true"
      OPENPOSTER_CORS_ORIGINS: "http://localhost:3000,http://localhost:3001,http://localhost:3002"
      OPENPOSTER_DEV_RESET_TOKEN: "dev-reset"
      # Announce to directory using Docker-internal URL (directory validates this)
      OPENPOSTER_ANNOUNCE_TO: "http://directory:8080"
      OPENPOSTER_ANNOUNCE_URL: "http://node-a:8080"
    volumes:
      - ./reference-node/openposter_node:/app/openposter_node
      - ./reference-node/pyproject.toml:/app/pyproject.toml:ro
      - ./reference-node/data-a:/data
    depends_on:
      directory:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/v1/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 10

  # ── Node B (consumer) ─────────────────────────────────────────────────────
  node-b:
    build: ./reference-node
    ports:
      - "8082:8080"
    environment:
      PORT: "8080"
      OPENPOSTER_BASE_URL: "http://localhost:8082"
      OPENPOSTER_OFFICIAL_DIRECTORY_URL: "http://directory:8080"
      OPENPOSTER_NODE_NAME: "Node B (Consumer)"
      OPENPOSTER_OPERATOR_NAME: "OpenPoster Dev"
      OPENPOSTER_OPERATOR_CONTACT: "mailto:dev@openposter.local"
      OPENPOSTER_ADMIN_TOKEN: "dev-admin"
      OPENPOSTER_ALLOW_PRIVATE_NODES: "true"
      OPENPOSTER_CORS_ORIGINS: "http://localhost:3000,http://localhost:3001,http://localhost:3002"
      OPENPOSTER_DEV_RESET_TOKEN: "dev-reset"
      # Announce to directory using Docker-internal URL (directory validates this)
      OPENPOSTER_ANNOUNCE_TO: "http://directory:8080"
      OPENPOSTER_ANNOUNCE_URL: "http://node-b:8080"
    volumes:
      - ./reference-node/openposter_node:/app/openposter_node
      - ./reference-node/pyproject.toml:/app/pyproject.toml:ro
      - ./reference-node/data-b:/data
    depends_on:
      directory:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/v1/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 10

  # ── Indexer ───────────────────────────────────────────────────────────────
  indexer:
    build: ./indexer
    ports:
      - "8090:8090"
    environment:
      PORT: "8090"
      OPENPOSTER_OFFICIAL_DIRECTORY_URL: "http://directory:8080"
      # Seed from directory — mirrors production topology
      OPENPOSTER_INDEXER_SEEDS: "http://directory:8080"
      OPENPOSTER_INDEXER_POLL_SECONDS: "10"
      OPENPOSTER_CORS_ORIGINS: "http://localhost:3000,http://localhost:3001,http://localhost:3002"
    volumes:
      - ./indexer/openposter_indexer:/app/openposter_indexer
      - ./indexer/pyproject.toml:/app/pyproject.toml:ro
      - ./indexer/data:/data
    depends_on:
      directory:
        condition: service_healthy
      node-a:
        condition: service_healthy
      node-b:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/v1/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 10

  # ── Issuer ────────────────────────────────────────────────────────────────
  issuer:
    build: ./issuer
    ports:
      - "8085:8085"
    environment:
      OPENPOSTER_ISSUER_BASE_URL: "http://localhost:8085"
      OPENPOSTER_ISSUER_JWT_SECRET: "dev-jwt-secret-change-in-production"
      OPENPOSTER_ISSUER_JWT_ISSUER: "openposter-issuer"
      OPENPOSTER_ISSUER_JWT_EXP_SECONDS: "31536000"
      OPENPOSTER_DEV_RESET_TOKEN: "dev-reset"
      OPENPOSTER_CORS_ORIGINS: "http://localhost:3000,http://localhost:3001,http://localhost:3002"
    volumes:
      - ./issuer/openposter_issuer:/app/openposter_issuer
      - ./issuer/pyproject.toml:/app/pyproject.toml:ro
      - ./issuer/data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8085/v1/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 10

  # ── Web UI (Studio + My Media) ────────────────────────────────────────────
  web:
    build: ./web
    ports:
      - "3000:3000"
    environment:
      # NEXT_PUBLIC_ vars are browser-visible — must use localhost so client fetches work
      NEXT_PUBLIC_INDEXER_BASE_URL: "http://localhost:8090"
      NEXT_PUBLIC_ISSUER_BASE_URL: "http://localhost:8085"
      # Server-side vars use Docker internal DNS for server component fetches
      INDEXER_BASE_URL: "http://indexer:8090"
      ISSUER_BASE_URL: "http://issuer:8085"
      TMDB_READ_ACCESS_TOKEN: "${TMDB_READ_ACCESS_TOKEN}"
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      node-a:
        condition: service_healthy
      indexer:
        condition: service_healthy
      issuer:
        condition: service_healthy
    volumes:
      - ./web:/app
      - web-node-modules:/app/node_modules
      - web-next-cache:/app/.next
    restart: unless-stopped

  # ── Web UI B (consumer testing — Node B) ─────────────────────────────────
  web-b:
    build: ./web
    ports:
      - "3002:3000"
    environment:
      NEXT_PUBLIC_INDEXER_BASE_URL: "http://localhost:8090"
      NEXT_PUBLIC_ISSUER_BASE_URL: "http://localhost:8085"
      INDEXER_BASE_URL: "http://indexer:8090"
      ISSUER_BASE_URL: "http://issuer:8085"
      TMDB_READ_ACCESS_TOKEN: "${TMDB_READ_ACCESS_TOKEN}"
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      node-b:
        condition: service_healthy
      indexer:
        condition: service_healthy
      issuer:
        condition: service_healthy
    volumes:
      - ./web:/app
      - web-b-node-modules:/app/node_modules
      - web-b-next-cache:/app/.next
    restart: unless-stopped

  # ── Diagnostics UI ────────────────────────────────────────────────────────
  diag:
    build: ./diagnostics-app
    ports:
      - "3001:3001"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      node-a:
        condition: service_healthy
      node-b:
        condition: service_healthy
      indexer:
        condition: service_healthy
      issuer:
        condition: service_healthy
    volumes:
      - ./diagnostics-app:/app
      - diag-node-modules:/app/node_modules
      - diag-next-cache:/app/.next
    restart: unless-stopped

volumes:
  web-node-modules:
  web-next-cache:
  web-b-node-modules:
  web-b-next-cache:
  diag-node-modules:
  diag-next-cache:
