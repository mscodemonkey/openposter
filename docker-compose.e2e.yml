# OpenPoster isolated local E2E compose.
# Uses alternate ports and disposable named volumes so tests can run
# alongside the normal dev stack without sharing state.

services:
  plex:
    build: ./plex-mock
    ports:
      - "32411:32400"
    environment:
      PLEX_TOKEN: "dev-plex-token"
      OPENPOSTER_DEV_RESET_TOKEN: "dev-reset"
      PLEX_SERVER_NAME: "OpenPoster Plex Mock"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:32400/healthz').read()"]
      interval: 10s
      timeout: 3s
      retries: 10

  directory:
    build: ./reference-node
    ports:
      - "8484:8080"
    environment:
      PORT: "8080"
      OPENPOSTER_BASE_URL: "http://localhost:8484"
      OPENPOSTER_NODE_NAME: "OpenPoster Directory"
      OPENPOSTER_OPERATOR_NAME: "OpenPoster Dev"
      OPENPOSTER_ADMIN_TOKEN: "dev-admin"
      OPENPOSTER_ALLOW_PRIVATE_NODES: "true"
      OPENPOSTER_CORS_ORIGINS: "http://localhost:3400,http://localhost:3401,http://localhost:3402"
      OPENPOSTER_DEV_RESET_TOKEN: "dev-reset"
    volumes:
      - ./reference-node/openposter_node:/app/openposter_node
      - ./reference-node/pyproject.toml:/app/pyproject.toml:ro
      - e2e-directory-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/v1/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 10

  node-a:
    build: ./reference-node
    ports:
      - "8481:8080"
    environment:
      PORT: "8080"
      OPENPOSTER_BASE_URL: "http://localhost:8481"
      OPENPOSTER_OFFICIAL_DIRECTORY_URL: "http://directory:8080"
      OPENPOSTER_NODE_NAME: "Node A (Creator)"
      OPENPOSTER_OPERATOR_NAME: "OpenPoster Dev"
      OPENPOSTER_OPERATOR_CONTACT: "mailto:dev@openposter.local"
      OPENPOSTER_ADMIN_TOKEN: "dev-admin"
      OPENPOSTER_ALLOW_PRIVATE_NODES: "true"
      OPENPOSTER_CORS_ORIGINS: "http://localhost:3400,http://localhost:3401,http://localhost:3402"
      OPENPOSTER_DEV_RESET_TOKEN: "dev-reset"
      OPENPOSTER_ANNOUNCE_TO: "http://directory:8080"
      OPENPOSTER_ANNOUNCE_URL: "http://node-a:8080"
    volumes:
      - ./reference-node/openposter_node:/app/openposter_node
      - ./reference-node/pyproject.toml:/app/pyproject.toml:ro
      - e2e-node-a-data:/data
    depends_on:
      directory:
        condition: service_healthy
      plex:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/v1/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 10

  node-b:
    build: ./reference-node
    ports:
      - "8482:8080"
    environment:
      PORT: "8080"
      OPENPOSTER_BASE_URL: "http://localhost:8482"
      OPENPOSTER_OFFICIAL_DIRECTORY_URL: "http://directory:8080"
      OPENPOSTER_NODE_NAME: "Node B (Consumer)"
      OPENPOSTER_OPERATOR_NAME: "OpenPoster Dev"
      OPENPOSTER_OPERATOR_CONTACT: "mailto:dev@openposter.local"
      OPENPOSTER_ADMIN_TOKEN: "dev-admin"
      OPENPOSTER_ALLOW_PRIVATE_NODES: "true"
      OPENPOSTER_CORS_ORIGINS: "http://localhost:3400,http://localhost:3401,http://localhost:3402"
      OPENPOSTER_DEV_RESET_TOKEN: "dev-reset"
      OPENPOSTER_ANNOUNCE_TO: "http://directory:8080"
      OPENPOSTER_ANNOUNCE_URL: "http://node-b:8080"
    volumes:
      - ./reference-node/openposter_node:/app/openposter_node
      - ./reference-node/pyproject.toml:/app/pyproject.toml:ro
      - e2e-node-b-data:/data
    depends_on:
      directory:
        condition: service_healthy
      plex:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/v1/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 10

  indexer:
    build: ./indexer
    ports:
      - "8490:8090"
    environment:
      PORT: "8090"
      OPENPOSTER_DEV_RESET_TOKEN: "dev-reset"
      OPENPOSTER_OFFICIAL_DIRECTORY_URL: "http://directory:8080"
      OPENPOSTER_INDEXER_SEEDS: "http://directory:8080"
      OPENPOSTER_INDEXER_POLL_SECONDS: "10"
      OPENPOSTER_CORS_ORIGINS: "http://localhost:3400,http://localhost:3401,http://localhost:3402"
    volumes:
      - ./indexer/openposter_indexer:/app/openposter_indexer
      - ./indexer/pyproject.toml:/app/pyproject.toml:ro
      - e2e-indexer-data:/data
    depends_on:
      directory:
        condition: service_healthy
      node-a:
        condition: service_healthy
      node-b:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/v1/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 10

  issuer:
    build: ./issuer
    ports:
      - "8485:8085"
    environment:
      OPENPOSTER_ISSUER_BASE_URL: "http://localhost:8485"
      OPENPOSTER_ISSUER_JWT_SECRET: "dev-jwt-secret-change-in-production"
      OPENPOSTER_ISSUER_JWT_ISSUER: "openposter-issuer"
      OPENPOSTER_ISSUER_JWT_EXP_SECONDS: "31536000"
      OPENPOSTER_DEV_RESET_TOKEN: "dev-reset"
      OPENPOSTER_CORS_ORIGINS: "http://localhost:3400,http://localhost:3401,http://localhost:3402"
    volumes:
      - ./issuer/openposter_issuer:/app/openposter_issuer
      - ./issuer/pyproject.toml:/app/pyproject.toml:ro
      - e2e-issuer-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8085/v1/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 10

  web:
    build: ./web
    ports:
      - "3400:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NEXT_PUBLIC_INDEXER_BASE_URL: "http://localhost:8490"
      NEXT_PUBLIC_ISSUER_BASE_URL: "http://localhost:8485"
      INDEXER_BASE_URL: "http://indexer:8090"
      ISSUER_BASE_URL: "http://issuer:8085"
      TMDB_READ_ACCESS_TOKEN: "${TMDB_READ_ACCESS_TOKEN}"
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      node-a:
        condition: service_healthy
      indexer:
        condition: service_healthy
      issuer:
        condition: service_healthy
    volumes:
      - ./web:/app
      - web-node-modules:/app/node_modules
      - web-next-cache:/app/.next
    restart: unless-stopped

  web-b:
    build: ./web
    ports:
      - "3402:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NEXT_PUBLIC_INDEXER_BASE_URL: "http://localhost:8490"
      NEXT_PUBLIC_ISSUER_BASE_URL: "http://localhost:8485"
      INDEXER_BASE_URL: "http://indexer:8090"
      ISSUER_BASE_URL: "http://issuer:8085"
      TMDB_READ_ACCESS_TOKEN: "${TMDB_READ_ACCESS_TOKEN}"
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      node-b:
        condition: service_healthy
      indexer:
        condition: service_healthy
      issuer:
        condition: service_healthy
    volumes:
      - ./web:/app
      - web-b-node-modules:/app/node_modules
      - web-b-next-cache:/app/.next
    restart: unless-stopped

  diag:
    build: ./diagnostics-app
    ports:
      - "3401:3001"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      node-a:
        condition: service_healthy
      node-b:
        condition: service_healthy
      indexer:
        condition: service_healthy
      issuer:
        condition: service_healthy
    volumes:
      - ./diagnostics-app:/app
      - diag-node-modules:/app/node_modules
      - diag-next-cache:/app/.next
    restart: unless-stopped

volumes:
  diag-next-cache:
  diag-node-modules:
  e2e-directory-data:
  e2e-indexer-data:
  e2e-issuer-data:
  e2e-node-a-data:
  e2e-node-b-data:
  web-b-next-cache:
  web-b-node-modules:
  web-next-cache:
  web-node-modules:
